<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>소소의 모험</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root{
  --forest-deep:#16311F;
  --forest-mid:#2F5B36;
  --forest-dark:#0F2417;
  --path-tan:#D9C08C;
  --path-tan-dark:#B79A5E;
  --parchment:#EFE1BC;
  --parchment-dark:#DDC896;
  --ink:#2B1B12;
  --mustard:#E8A93C;
  --mustard-dark:#C98A28;
  --ember:#B23A24;
  --ember-dark:#8A2A19;
  --moss:#8FBF5C;
  --moss-dark:#5B8C3A;
  --gold:#F0C766;
  --purple:#8B5FBF;
  --blue:#5C8FBF;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--forest-dark);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}
.pixel{font-family:'Press Start 2P',monospace;}
#app{
  width:100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}
button{
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
  border:none;
  outline:none;
}
button:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--mustard-dark); border-radius:4px;}

/* ---------- 공통 ---------- */
.screen{width:100%; max-width:520px; min-height:100vh; position:relative; margin:0 auto;}
.hidden{display:none !important;}
.toast{
  position:fixed; top:14px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:var(--gold); padding:10px 18px; border-radius:8px;
  font-size:13px; font-weight:700; z-index:999; box-shadow:0 4px 12px rgba(0,0,0,.4);
  border:2px solid var(--gold); opacity:0; transition:opacity .25s, top .25s;
  pointer-events:none; text-align:center; max-width:88%;
}
.toast.show{opacity:1; top:24px;}

/* ---------- 타이틀 ---------- */
.title-screen{
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:
    radial-gradient(ellipse at 50% 20%, #1f4a2c 0%, var(--forest-deep) 55%, var(--forest-dark) 100%);
  padding:24px; text-align:center; gap:6px;
}
.title-badge{
  font-size:11px; letter-spacing:2px; color:var(--gold); opacity:.85; margin-bottom:10px;
}
.title-main{
  font-size:32px; color:var(--mustard); text-shadow:3px 3px 0 var(--ink), 0 0 24px rgba(232,169,60,.35);
  line-height:1.5; margin:0 0 18px;
}
.title-sub{ color:var(--path-tan); font-size:13px; margin-bottom:34px; line-height:1.8; opacity:.9;}
.soso-title-wrap{ margin-bottom:28px; filter:drop-shadow(0 8px 16px rgba(0,0,0,.5)); }
.btn-primary{
  background:linear-gradient(180deg,var(--mustard),var(--mustard-dark));
  color:var(--ink); font-weight:900; font-size:16px; padding:16px 42px; border-radius:10px;
  border-bottom:4px solid #9a6a1c; box-shadow:0 4px 0 rgba(0,0,0,.25);
  transition:transform .08s;
}
.btn-primary:active{ transform:translateY(3px); border-bottom-width:1px;}
.btn-secondary{
  margin-top:14px; background:transparent; color:var(--path-tan); font-size:12px;
  text-decoration:underline; padding:8px;
}
.topic-list{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:380px; margin-top:22px;}
.topic-chip{
  font-size:10px; background:rgba(217,192,140,.12); border:1px solid var(--path-tan-dark);
  color:var(--path-tan); padding:5px 9px; border-radius:20px;
}

/* ---------- 지도 화면 ---------- */
.map-screen{ min-height:100vh; background:
    linear-gradient(180deg, var(--forest-dark) 0%, var(--forest-deep) 8%, var(--forest-mid) 100%);
  padding-bottom:40px; position:relative;
}
.map-header{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; background:linear-gradient(180deg,rgba(15,36,23,.97),rgba(15,36,23,.75) 80%,transparent);
}
.act-label{ font-size:11px; color:var(--gold); }
.act-title{ font-size:15px; color:var(--parchment); font-weight:900; margin-top:2px;}
.hp-pill{
  display:flex; align-items:center; gap:6px; background:rgba(0,0,0,.35); border:1px solid var(--ember);
  border-radius:20px; padding:6px 12px;
}
.hp-pill .heart{color:var(--ember); font-size:14px;}
.hp-pill .val{font-size:12px; font-weight:900; color:var(--parchment);}
.map-scroll{ position:relative; padding:20px 12px 10px; }
.map-svg{ position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;}
.map-row{ display:flex; justify-content:center; gap:34px; margin-bottom:64px; position:relative; z-index:2; }
.node-btn{
  width:64px; height:64px; border-radius:14px; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; position:relative; transition:transform .15s, filter .15s;
  background:var(--path-tan); border:3px solid var(--path-tan-dark);
  box-shadow:0 4px 0 rgba(0,0,0,.25), inset 0 0 0 2px rgba(255,255,255,.15);
}
.node-btn .ic{font-size:24px;}
.node-btn .lv{font-size:8px; color:var(--ink); opacity:.6; margin-top:1px;}
.node-btn.locked{ filter:grayscale(.9) brightness(.45); cursor:default; }
.node-btn.reachable{ cursor:pointer; animation:pulseNode 1.8s ease-in-out infinite; }
.node-btn.reachable:hover{ transform:translateY(-4px) scale(1.05); }
.node-btn.done{ filter:brightness(.6) saturate(.5); cursor:default; }
.node-btn.boss{ width:78px; height:78px; background:var(--ember); border-color:var(--ember-dark); }
.node-btn.boss .ic{font-size:32px;}
@keyframes pulseNode{ 0%,100%{box-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 0 0 rgba(240,199,102,.6);} 50%{box-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 0 10px rgba(240,199,102,0);} }
.player-token{
  position:absolute; width:36px; height:36px; z-index:5; pointer-events:none;
  transition:top .5s ease, left .5s ease; transform:translate(-50%,-115%);
  animation:tokenBob 1.6s ease-in-out infinite;
}
.player-token canvas{
  width:100%; height:100%; border-radius:50%;
  box-shadow:0 0 0 4px rgba(232,169,60,.35), 0 4px 6px rgba(0,0,0,.45);
}
@keyframes tokenBob{ 0%,100%{ margin-top:0; } 50%{ margin-top:-4px; } }
.map-legend{
  display:flex; justify-content:center; gap:10px; flex-wrap:wrap; padding:10px 16px 0; font-size:9px; color:var(--path-tan);
}
.map-legend span{ display:flex; align-items:center; gap:3px; }
.kills-hint{
  text-align:center; font-size:10px; color:var(--gold); background:rgba(0,0,0,.25); margin:8px 16px 0;
  padding:6px 10px; border-radius:8px; border:1px solid rgba(240,199,102,.3);
}
.node-btn.locked .ic{ filter:saturate(.3); }

/* ---------- 인벤토리 바 ---------- */
.inv-bar{
  position:fixed; bottom:0; left:0; right:0; z-index:30; display:flex; justify-content:center; gap:8px;
  padding:8px 10px calc(10px + env(safe-area-inset-bottom)); background:rgba(15,36,23,.95);
  border-top:2px solid var(--mustard-dark); max-width:520px; margin:0 auto;
}
.inv-slot{
  width:38px; height:38px; border-radius:8px; background:rgba(217,192,140,.1); border:1px dashed var(--path-tan-dark);
  display:flex; align-items:center; justify-content:center; font-size:18px; position:relative;
}
.inv-slot.filled{ background:rgba(232,169,60,.15); border:1px solid var(--mustard);}
.inv-slot .rarity-dot{ position:absolute; top:2px; right:2px; width:6px; height:6px; border-radius:50%;}

/* ---------- 전투 화면 ---------- */
.battle-screen{ min-height:100vh; display:flex; flex-direction:column;
  background:
   radial-gradient(ellipse at 50% 0%, #2a4d2f 0%, var(--forest-deep) 60%),
   var(--forest-dark);
  padding-bottom:210px;
}
.battle-topbar{ display:flex; justify-content:space-between; align-items:center; padding:10px 14px; }
.act-chip{ font-size:9px; color:var(--gold); background:rgba(0,0,0,.3); padding:4px 8px; border-radius:6px;}
.combo-chip{ font-size:10px; color:var(--parchment); background:rgba(0,0,0,.3); padding:4px 8px; border-radius:6px; display:flex; align-items:center; gap:4px;}
.combo-chip b{color:var(--gold); font-size:12px;}

.monster-hud{ text-align:center; padding:2px 20px 6px; }
.monster-name{ font-size:14px; font-weight:900; color:var(--parchment); margin-bottom:6px; letter-spacing:.5px;}
.monster-atk-badge{
  display:inline-flex; align-items:center; gap:4px; font-size:10px; color:#ffd9c9; background:rgba(178,58,36,.35);
  border:1px solid var(--ember); padding:3px 8px; border-radius:10px; margin-bottom:7px; font-weight:700;
}
.monster-hpbar-wrap{ display:flex; align-items:center; gap:8px; justify-content:center;}
.monster-hpbar{
  width:220px; height:20px; background:#1b1210; border:3px solid var(--ink); border-radius:4px; overflow:hidden;
  position:relative; box-shadow:inset 0 2px 4px rgba(0,0,0,.6);
}
.monster-hpbar-fill{ height:100%; background:linear-gradient(180deg,#e85a3c,var(--ember)); transition:width .4s ease; }
.monster-hp-text{ font-size:11px; color:var(--parchment); white-space:nowrap;}

.player-hud{ display:flex; flex-direction:column; align-items:center; gap:4px; margin-top:8px; width:132px;}
.player-hud-top{ display:flex; align-items:center; gap:5px; }
.player-hud .heart-ic{ font-size:12px; color:var(--ember); }
.player-hpbar{
  width:120px; height:14px; background:#1b1210; border:2px solid var(--ink); border-radius:8px; overflow:hidden;
  box-shadow:inset 0 2px 3px rgba(0,0,0,.6);
}
.player-hpbar-fill{ height:100%; background:linear-gradient(180deg,#7fd15a,var(--moss-dark)); transition:width .4s ease, background .3s; }
.player-hp-text{ font-size:10.5px; color:var(--parchment); font-weight:700; white-space:nowrap;}
.player-hud.low-hp .player-hpbar-fill{ background:linear-gradient(180deg,#ff8a6a,var(--ember)); }
.player-hud.low-hp .player-hp-text{ color:#ffb0a0; animation:lowHpBlink 1s ease-in-out infinite; }
.player-hud.low-hp .player-hpbar{ animation:lowHpBorder 1s ease-in-out infinite; }
@keyframes lowHpBlink{ 0%,100%{opacity:1;} 50%{opacity:.45;} }
@keyframes lowHpBorder{ 0%,100%{ box-shadow:inset 0 2px 3px rgba(0,0,0,.6), 0 0 0 0 rgba(178,58,36,.7);} 50%{ box-shadow:inset 0 2px 3px rgba(0,0,0,.6), 0 0 0 5px rgba(178,58,36,0);} }
.low-hp-tag{ display:none; font-size:8.5px; color:#fff; background:var(--ember); padding:2px 6px; border-radius:6px; font-weight:900; letter-spacing:.5px;}
.player-hud.low-hp .low-hp-tag{ display:inline-block; animation:lowHpBlink 1s ease-in-out infinite; }

.arena{ flex:1; display:flex; align-items:flex-end; justify-content:space-between; padding:6px 26px 18px; position:relative; min-height:180px;}
.arena::after{ content:''; position:absolute; left:8%; right:8%; bottom:8px; height:14px; background:radial-gradient(ellipse,rgba(0,0,0,.35),transparent 70%);}
.soso-slot{ position:relative; }
.monster-slot{ display:flex; flex-direction:column; align-items:center; gap:6px; }
.monster-frame{
  width:110px; height:110px; border-radius:16px; background:linear-gradient(180deg,var(--parchment-dark),var(--path-tan));
  border:3px solid var(--ink); display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 0 rgba(0,0,0,.3); position:relative; transition:transform .12s;
}
#monsterCanvas{ width:98px; height:98px; filter:drop-shadow(0 3px 3px rgba(0,0,0,.35)); }
.monster-frame.shake{ animation:shakeM .3s; }
.monster-frame.dying{ animation:dying .5s forwards; }
@keyframes shakeM{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px) rotate(-3deg);} 75%{transform:translateX(8px) rotate(3deg);} }
@keyframes dying{ to{ transform:scale(0) rotate(30deg); opacity:0;} }
.dmg-pop{
  position:absolute; font-size:20px; color:var(--gold); text-shadow:2px 2px 0 var(--ink); pointer-events:none;
  animation:popUp .8s ease forwards; z-index:10; font-family:'Press Start 2P',monospace;
}
.dmg-pop.miss{ color:#aaa; }
@keyframes popUp{ 0%{opacity:0; transform:translateY(0) scale(.6);} 15%{opacity:1; transform:translateY(-10px) scale(1.1);} 100%{opacity:0; transform:translateY(-52px) scale(1);} }

#sosoCanvas{ width:132px; height:145px; filter:drop-shadow(0 6px 6px rgba(0,0,0,.4)); }

/* ---------- 하단 문제 패널 ---------- */
.quiz-dock{
  position:fixed; bottom:0; left:0; right:0; max-width:520px; margin:0 auto; z-index:40;
  background:var(--parchment); border-top:4px solid var(--ink); border-radius:18px 18px 0 0;
  box-shadow:0 -8px 24px rgba(0,0,0,.4); padding:12px 14px calc(12px + env(safe-area-inset-bottom));
}
.timer-track{ height:8px; background:#c8b384; border-radius:4px; overflow:hidden; margin-bottom:10px; border:1px solid var(--ink);}
.timer-fill{ height:100%; background:var(--moss-dark); transition:width .12s linear, background .3s; }
.timer-fill.warn{ background:var(--ember); }
.quiz-topic{ font-size:10px; color:var(--mustard-dark); font-weight:700; margin-bottom:3px;}
.quiz-q{ font-size:14.5px; font-weight:700; color:var(--ink); line-height:1.5; margin-bottom:10px; min-height:44px;}
.quiz-options{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;}
.opt-btn{
  background:#fff9ec; border:2px solid var(--parchment-dark); border-radius:10px; padding:10px 8px;
  font-size:12.5px; font-weight:600; text-align:left; line-height:1.35; color:var(--ink); transition:all .15s;
  display:flex; gap:6px;
}
.opt-btn .num{ color:var(--mustard-dark); font-weight:900; flex-shrink:0;}
.opt-btn:not(:disabled):active{ transform:scale(.97); }
.opt-btn:disabled{ cursor:default; }
.opt-btn.correct{ background:var(--moss); border-color:var(--moss-dark); color:#0d2b06;}
.opt-btn.wrong{ background:#e8a794; border-color:var(--ember); color:var(--ember-dark);}
.opt-btn.eliminated{ opacity:.25; text-decoration:line-through; }
.explain-box{
  font-size:11.5px; background:rgba(0,0,0,.05); border-radius:8px; padding:8px 10px; color:#5a4a34;
  margin-bottom:8px; line-height:1.5; display:none;
}
.explain-box.show{ display:block; }
.dock-actions{ display:flex; gap:8px; align-items:center; }
.skill-btn{
  font-size:10.5px; background:rgba(139,95,191,.12); border:1.5px solid var(--purple); color:#5b3f80;
  padding:7px 10px; border-radius:8px; font-weight:700; display:flex; align-items:center; gap:4px;
}
.skill-btn:disabled{ opacity:.3; }
.next-btn{
  margin-left:auto; background:var(--ink); color:var(--gold); font-weight:900; font-size:12.5px;
  padding:10px 20px; border-radius:8px;
}

/* ---------- 오버레이(보상/휴식/이벤트/게임오버/승리) ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(10,20,12,.88); z-index:100; display:flex; align-items:center;
  justify-content:center; padding:24px; backdrop-filter:blur(2px);
}
.panel{
  background:var(--parchment); border:4px solid var(--ink); border-radius:16px; padding:26px 22px;
  max-width:440px; width:100%; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.5);
  max-height:88vh; overflow-y:auto;
}
.panel h2{ font-size:18px; margin:0 0 6px; color:var(--ink); }
.panel .desc{ font-size:12.5px; color:#6b5a42; margin-bottom:18px; line-height:1.6;}
.reward-grid{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:14px;}
.reward-card{
  width:120px; background:#fff9ec; border:2px solid var(--parchment-dark); border-radius:12px; padding:12px 8px;
  cursor:pointer; transition:transform .15s, box-shadow .15s;
}
.reward-card:hover{ transform:translateY(-4px); box-shadow:0 6px 14px rgba(0,0,0,.2); }
.reward-card .ric{ font-size:32px; margin-bottom:6px;}
.reward-card .rname{ font-size:11.5px; font-weight:900; margin-bottom:4px;}
.reward-card .rdesc{ font-size:9.5px; color:#7a6a52; line-height:1.4;}
.reward-card .rrarity{ font-size:8px; font-weight:900; margin-top:6px; padding:2px 6px; border-radius:10px; display:inline-block;}
.rrarity.common{ background:#d9d9d9; color:#444;}
.rrarity.rare{ background:#cfe0f5; color:#2a5788;}
.rrarity.legendary{ background:#f0d9a6; color:#8a5a0a;}
.panel-btn{
  background:var(--mustard); color:var(--ink); font-weight:900; font-size:13px; padding:11px 24px;
  border-radius:8px; border-bottom:3px solid var(--mustard-dark); margin:4px;
}
.panel-btn.secondary{ background:transparent; border:2px solid var(--path-tan-dark); color:var(--ink); border-bottom:none;}
.panel-btn.danger{ background:var(--ember); color:#fff; border-bottom-color:var(--ember-dark);}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================
   소소의 모험 — 데이터
   ========================================================= */
const TOPIC_META = {
  recruit:{name:'채용', icon:'📋'}, ld:{name:'교육/육성', icon:'🎓'},
  perf:{name:'성과관리', icon:'📈'}, comp:{name:'보상', icon:'💰'}, culture:{name:'조직문화', icon:'🤝'},
  labor:{name:'노동법', icon:'⚖️'}, org:{name:'조직설계', icon:'🏢'}, analytics:{name:'피플애널리틱스', icon:'📊'}
};
const ACT_TOPICS = { 1:['recruit','ld'], 2:['perf','comp','culture'], 3:['labor','org','analytics'] };
const ACT_TIME = {1:15, 2:15, 3:10};

/* ---- 문제 은행 (140) : [id, topic, q, [보기4], 정답idx, 해설] ---- */
const QUESTIONS = [
["Q001","recruit","채용공고에 \"남성만 지원 가능\"이라고 명시해도 직무 특성상 필요하다면 법적으로 문제없다?",["그렇다","아니다","회사 재량이다","공고에만 적으면 된다"],1,"남녀고용평등법상 모집·채용의 성차별은 원칙적으로 금지됩니다."],
["Q002","recruit","JD(Job Description)는 무엇을 정리한 문서인가?",["직무 내용과 요구 자격","연봉 테이블","조직도","평가 기준표"],0,"직무의 역할·과업·자격요건을 담습니다."],
["Q003","recruit","ATS는 무엇의 약자인가?",["Applicant Tracking System","Annual Talent Summary","Active Time Sheet","Automated Training System"],0,"지원자 관리 시스템입니다."],
["Q004","recruit","내부 채용의 일반적 장점은?",["조직 적응 기간이 짧다","인재 풀이 더 넓다","항상 비용이 더 든다","외부 시각이 유입된다"],0,"문화·프로세스를 이미 알아 온보딩 비용이 낮습니다."],
["Q005","recruit","채용절차법상 지원자에게 물어선 안 되는 것은?",["직무 경력","직계존비속의 재산","보유 자격증","희망 연봉"],1,"직무와 무관한 개인정보 요구는 채용절차법 위반입니다."],
["Q006","recruit","채용 요청 승인부터 오퍼 수락까지의 기간을 뜻하는 지표는?",["Time to Hire","Cost per Hire","Offer Acceptance Rate","Yield Ratio"],0,"Time to Fill과 시작점이 다른 점에 유의하세요."],

function pickRewardItems(n){
  const weighted=[];
  ITEMS.forEach(it=>{
    const w = it.rarity==='common'?60: it.rarity==='rare'?32:8;
    weighted.push({it,w});
  });
  const pool=[...ITEMS];
  const out=[];
  while(out.length<n && pool.length){
    let total=0; const cand=pool.map(it=>{const w=it.rarity==='common'?60:it.rarity==='rare'?32:8; total+=w; return {it,w};});
    let r=Math.random()*total, chosen=cand[0].it;
    for(const c of cand){ if(r<c.w){chosen=c.it;break;} r-=c.w; }
    out.push(chosen);
    pool.splice(pool.indexOf(chosen),1);
  }
  return out;
}

   맵 생성
   ========================================================= */
function generateMap(act){
  const levels=[];
  for(let lv=1; lv<=7; lv++){
    const count = lv===1 ? 3 : (2 + (lv%2===0?1:0)); // 2~3개
    let types;
    if(lv===1){
      // 초기 선택지는 무조건 몬스터 조우
      types = Array(count).fill('battle');
    } else {
      // 실제 타입은 해당 단계에 도달했을 때(안개 해제 시) 결정됨
      types = Array(count).fill('fog');
    }
    const nodes = types.map((type,i)=>({id:`a${act}_l${lv}_${i}`, level:lv, idx:i, type, done:false}));
    levels.push(nodes);
  }
  levels.push([{id:`a${act}_boss`, level:8, idx:0, type:'boss', done:false}]);
  // connections: each node in level i connects to 1-2 nodes in level i+1 with close idx
  for(let lv=0; lv<levels.length-1; lv++){
    const cur=levels[lv], next=levels[lv+1];
    const nextIncoming = new Set();
    cur.forEach(n=>{
      const ratio = n.idx/(Math.max(cur.length-1,1));
      const targetIdx = Math.round(ratio*(next.length-1));
      const conns = new Set([targetIdx]);
      if(next.length>1 && Math.random()<0.5){
        conns.add(Math.max(0,Math.min(next.length-1, targetIdx + (Math.random()<0.5?-1:1))));
      }
      n.next = [...conns];
      conns.forEach(c=>nextIncoming.add(c));
    });
    next.forEach((n,i)=>{
      if(!nextIncoming.has(i)){
        // 고아 노드 방지: 가장 가까운 이전 노드에 연결 추가
        let closest=cur[0]; let bd=999;
        cur.forEach(c=>{ const d=Math.abs(c.idx-i); if(d<bd){bd=d; closest=c;} });
        closest.next.push(i);
      }
    });
  }
  return {act, levels, startLevel:0};
}
function weightedType(w){
  const entries=Object.entries(w);
  const total=entries.reduce((s,[,v])=>s+v,0);
  let r=Math.random()*total;
  for(const [k,v] of entries){ if(r<v) return k; r-=v; }
  return entries[0][0];
}
function weightedTypeExcl(exclList){
  const weights={battle:40, unknown:25, treasure:15, rest:20};
  exclList.forEach(k=>delete weights[k]);
  return weightedType(weights);
}
/* 몬스터를 최소 3회 조우하기 전에는 보물(아이템) 노드가 나오지 않도록 단계별 타입을
   실제로 도달했을 때 결정한다(안개 해제). 항상 전투 1개는 보장한다. */
function ensureLevelRevealed(act){
  const map=G.maps[act]; const prog=G.progress[act];
  const rowIdx=prog.level;
  if(rowIdx>=map.levels.length) return;
  const row=map.levels[rowIdx];
  if(!row.some(n=>n.type==='fog')) return;
  const kills = prog.kills||0;
  const allowTreasure = kills>=3;
  const count=row.length;
  let types=['battle'];
  types.push(allowTreasure ? 'treasure' : weightedTypeExcl(['treasure']));
  for(let i=2;i<count;i++){
    types.push(weightedTypeExcl(allowTreasure?[]:['treasure']));
  }
  types=types.sort(()=>Math.random()-0.5);
  row.forEach((n,i)=>{ n.type=types[i]; });
}

            const cls = n.type==='boss'?'boss':'';
            let state = isDone?'done':(isReachable?'reachable':'locked');
            return `<button class="node-btn ${cls} ${state}" data-id="${n.id}" data-level="${lv}" ${state!=='reachable'?'disabled':''}>
              <span class="ic">${NODE_ICON[n.type]}</span>
              <span class="lv pixel">${lv+1}</span>
            </button>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
    <div style="height:70px;"></div>
    ${renderInvBar()}
  </div>`;
  document.querySelectorAll('.node-btn.reachable').forEach(btn=>{
    btn.onclick=()=>enterNode(btn.dataset.id, parseInt(btn.dataset.level));
  });
  requestAnimationFrame(()=>{ drawMapLines(map, prog, allowedIds); positionPlayerToken(map, prog); });
}
function getAllowedIds(map, prog){
  if(prog.visited.length===0){
    return new Set(map.levels[0].map(n=>n.id));
  }
  const lastId=prog.visited[prog.visited.length-1];
  const lastNode=findNode(lastId);
  const targetRow=map.levels[prog.level];
  if(!lastNode || !targetRow) return new Set();
  return new Set((lastNode.next||[]).map(idx=>targetRow[idx]&&targetRow[idx].id).filter(Boolean));
}
function drawMapLines(map,prog,allowedIds){
  const svg=document.getElementById('mapSvg');
  const scroll=document.getElementById('mapScroll');
  if(!svg||!scroll) return;
  const scRect=scroll.getBoundingClientRect();
  svg.setAttribute('width', scRect.width);
  svg.setAttribute('height', scRect.height);
  let paths='';
  map.levels.forEach((row,lv)=>{
    if(lv===map.levels.length-1) return;
    row.forEach(n=>{
      const fromEl=document.querySelector(`.node-btn[data-id="${n.id}"]`);
      if(!fromEl) return;
      const fr=fromEl.getBoundingClientRect();
      const fx=fr.left+fr.width/2-scRect.left, fy=fr.top-scRect.top;
      (n.next||[]).forEach(ni=>{
        const target=map.levels[lv+1][ni];
        if(!target) return;
        const toEl=document.querySelector(`.node-btn[data-id="${target.id}"]`);
        if(!toEl) return;
        const tr=toEl.getBoundingClientRect();
        const tx=tr.left+tr.width/2-scRect.left, ty=tr.top+tr.height-scRect.top;
        const done = prog.visited.includes(n.id) && prog.visited.includes(target.id);
        const isCurrentChoice = prog.visited.includes(n.id) && allowedIds && allowedIds.has(target.id) && lv+1===prog.level;
        const active = done || isCurrentChoice;
        paths+=`<line x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}" stroke="${done?'#F0C766':'#D9C08C'}" stroke-width="2.5" stroke-dasharray="6,6" opacity="${active?0.9:0.22}"/>`;
      });
    });
  });
  svg.innerHTML=paths;
}
function positionPlayerToken(map,prog){
  const scroll=document.getElementById('mapScroll');
  if(!scroll) return;
  const lv=Math.min(prog.level, map.levels.length-1);
  const visitedInLevel = map.levels[lv].find(n=>!prog.visited.includes(n.id)) || map.levels[lv][0];
  let refEl;
  if(prog.level===0 && prog.visited.length===0){
    refEl=document.querySelector(`.map-row[data-level="0"]`);
  } else {
    const lastVisitedId = prog.visited[prog.visited.length-1];
    refEl = lastVisitedId ? document.querySelector(`.node-btn[data-id="${lastVisitedId}"]`) : null;
  }
  let existing=document.querySelector('.player-token');
  if(!existing){
    existing=document.createElement('div');
    existing.className='player-token';
    existing.innerHTML=`<canvas width="34" height="34"></canvas>`;
    scroll.appendChild(existing);
    drawSosoToken(existing.querySelector('canvas').getContext('2d'));
  }
  const scRect=scroll.getBoundingClientRect();
  if(refEl){
    const r=refEl.getBoundingClientRect();
    existing.style.left=(r.left+r.width/2-scRect.left)+'px';
    existing.style.top=(r.top-scRect.top)+'px';
  }
}
function renderInvBar(){
  const slots=[];
  for(let i=0;i<6;i++){
    const it=G.items[i];
    if(it){
      const rc = it.rarity==='legendary'?'var(--gold)':it.rarity==='rare'?'var(--blue)':'#999';
      slots.push(`<div class="inv-slot filled" title="${it.name}: ${it.desc}">${it.icon}<div class="rarity-dot" style="background:${rc}"></div></div>`);
    } else {
      slots.push(`<div class="inv-slot"></div>`);
    }
  }
  return `<div class="inv-bar">${slots.join('')}</div>`;
}

function markVisited(nodeId, level){
  const prog=G.progress[G.act];
  prog.visited.push(nodeId);
  prog.level = level+1;
}
function findNode(nodeId){
  const map=G.maps[G.act];
  for(const row of map.levels) for(const n of row) if(n.id===nodeId) return n;
}
function enterNode(nodeId, level){
  const node=findNode(nodeId);
  if(node.type==='battle'){
    const pool=MONSTERS[G.act];
    const m=pool[Math.floor(Math.random()*pool.length)];
    startBattle({...m}, ()=>{ markVisited(nodeId,level); afterNodeResolved(); });
  } else if(node.type==='boss'){
    const b=BOSSES[G.act];
    startBattle({...b}, ()=>{ markVisited(nodeId,level); onBossDefeated(); });
  } else if(node.type==='treasure'){
    markVisited(nodeId,level);
    showTreasure(()=>afterNodeResolved());
  } else if(node.type==='rest'){
    markVisited(nodeId,level);
    showRest(()=>afterNodeResolved());
  } else if(node.type==='unknown'){
    markVisited(nodeId,level);
    resolveUnknown(()=>afterNodeResolved());
  }
}
function afterNodeResolved(){
  G.screen='map'; renderMap();
}

/* =========================================================
   전투
   ========================================================= */
function pickQuestion(topics, act){
  const level = act;
  let pool = QUESTIONS.filter(q=>topics.includes(q[1]) && !G.usedQuestionIds.has(q[0]));
  if(pool.length===0){
    G.usedQuestionIds.clear();
    pool = QUESTIONS.filter(q=>topics.includes(q[1]));
  }
  const q = pool[Math.floor(Math.random()*pool.length)];
  G.usedQuestionIds.add(q[0]);
  return shuffleQuestionOptions(q);
}
/* 정답이 특정 번호(주로 1번)에 몰리지 않도록 매번 보기 순서를 랜덤으로 섞는다.
   원본 QUESTIONS 데이터는 건드리지 않고 새 배열을 반환한다. */
function shuffleQuestionOptions(q){
  const order=[0,1,2,3];
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  const newOptions = order.map(i=>q[3][i]);
  const newAnswerIdx = order.indexOf(q[4]);
  return [q[0], q[1], q[2], newOptions, newAnswerIdx, q[5]];
}
/* 같은 막 안에서 몬스터를 조우할수록(=처치할수록) 몬스터 체력이 점점 늘어난다 */
function scaledMonsterHp(baseHp, isBoss){
  const kills = (G.progress[G.act] && G.progress[G.act].kills) || 0;
  const growth = isBoss ? Math.min(kills*0.05, 0.4) : Math.min(kills*0.12, 0.7);
  return Math.round(baseHp * (1+growth));
}
function startBattle(monster, onWin){
  const scaledHp = scaledMonsterHp(monster.hp, !!monster.boss);
  G.battle = {
    monster:{...monster, hp:scaledHp, maxHp:scaledHp},
    onWin,
    combo:0,
    chargesUsed:{hint:false, eliminate:false, negate_wrong:false},
    eliminatedIdx:[],
    timer:null, timeLeft:0, answered:false,
    q:null
  };
  G.screen='battle';
  nextQuestion();
}
function nextQuestion(){
  const b=G.battle;
  b.q = pickQuestion(b.monster.topics, G.act);
  b.eliminatedIdx=[];
  b.answered=false;
  b.timeLeft = currentTimer();
  renderBattle();
  startTimer();
}
function startTimer(){
  clearInterval(G.battle.timer);
  const total=currentTimer();
  G.battle.timer=setInterval(()=>{
    G.battle.timeLeft -= 0.1;
    updateTimerUI(total);
    if(G.battle.timeLeft<=0){
      clearInterval(G.battle.timer);
      if(!G.battle.answered) handleAnswer(-1);
    }
  },100);
}
function updateTimerUI(total){
  const fill=document.getElementById('timerFill');
  if(!fill) return;
  const pct=Math.max(0,(G.battle.timeLeft/total)*100);
  fill.style.width=pct+'%';
  fill.classList.toggle('warn', pct<30);

function handleAnswer(idx){
  const b=G.battle; if(b.answered) return; b.answered=true;
  clearInterval(b.timer);
  const q=b.q; const correct = idx===q[4];
  document.querySelectorAll('.opt-btn').forEach(btn=>btn.disabled=true);
  const btns=document.querySelectorAll('.opt-btn');
  btns[q[4]].classList.add('correct');
  if(!correct && idx>=0) btns[idx].classList.add('wrong');
  const explainBox=document.getElementById('explainBox');
  if(q[5]){ explainBox.textContent='💡 '+q[5]; explainBox.classList.add('show'); }
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('hintBtn').disabled=true;
  document.getElementById('elimBtn').disabled=true;

  if(correct){
    b.combo++;
    const mult = b.combo>=5?2.0:b.combo>=3?1.5:1.0;
    let dmg = currentAtk()*mult;
    let crit=false;
    const critChance = Math.min(0.9, itemSum('crit'));
    if(critChance>0 && Math.random()<critChance){ dmg*=2; crit=true; }
    if(b.combo>=3){ dmg*= (1+itemSum('combo_bonus')); } // 성과 그래프 여러 개면 배율도 누적
    dmg=Math.round(dmg);
    b.monster.hp=Math.max(0,b.monster.hp-dmg);
    animateAttack(dmg, crit);
    updateComboUI(b.combo);
    updateMonsterHp();
    setTimeout(()=>{
      if(b.monster.hp<=0){ onMonsterDefeated(); }
    }, 550);
  } else {
    b.combo=0;
    updateComboUI(0);
    let negated=false;
    if(hasItem('negate_wrong') && !b.chargesUsed.negate_wrong){
      b.chargesUsed.negate_wrong=true; negated=true;
      toast('📜 근로계약서 발동! 피해 무효화');
    }
    if(hasItem('combo_shield') && b.combo>=itemVal('combo_shield',5)) negated=true;
    if(!negated){
      let dmg=b.monster.atk;
      G.items.filter(i=>i.type==='dmg_reduction').forEach(i=>{ dmg*= (1-i.val); }); // 방어 아이템 중첩 시 감소율 복합 적용
      if(b.monster.boss){
        G.items.filter(i=>i.type==='boss_dmg_reduction').forEach(i=>{ dmg*= (1-i.val); });
      }
      dmg=Math.max(1,Math.round(dmg));
      G.player.hp=Math.max(0, G.player.hp-dmg);
      updatePlayerHud();
      animateHit(dmg);
    } else {
      animateHit(0,true);
    }
  }
  document.getElementById('nextBtn').onclick=()=>{
    if(G.player.hp<=0){ handleDefeatCheck(); return; }
    if(b.monster.hp<=0) return; // 이미 onMonsterDefeated에서 처리
    nextQuestion();
  };
}
function updateComboUI(v){ const el=document.getElementById('comboVal'); if(el) el.textContent=v; }
function updateMonsterHp(){
  const b=G.battle;
  const fill=document.getElementById('mHpFill'); const txt=document.getElementById('mHpText');
  if(fill) fill.style.width=(Math.max(0,b.monster.hp)/b.monster.maxHp*100)+'%';
  if(txt) txt.textContent=`${Math.max(0,b.monster.hp)}/${b.monster.maxHp}`;
}
function updatePlayerHud(){
  const hud=document.getElementById('playerHud');
  if(!hud) return;
  const fill=document.getElementById('pHpFill'); const txt=document.getElementById('pHpText');
  const pct = Math.max(0, G.player.hp)/G.player.maxHp*100;
  if(fill) fill.style.width=pct+'%';
  if(txt) txt.textContent=`${Math.max(0,G.player.hp)}/${G.player.maxHp}`;
  hud.classList.toggle('low-hp', G.player.hp>0 && G.player.hp/G.player.maxHp<=0.3);
}
function spawnDmgPop(text, anchorEl, extraClass){
  const arena=document.querySelector('.arena');
  if(!arena || !anchorEl) return;
  const aRect=arena.getBoundingClientRect();
  const eRect=anchorEl.getBoundingClientRect();
  const wrap=document.createElement('div');
  wrap.style.position='absolute';
  wrap.style.left=(eRect.left + eRect.width/2 - aRect.left)+'px';
  wrap.style.top=(eRect.top - aRect.top - 14)+'px';
  wrap.style.transform='translateX(-50%)';
  wrap.style.pointerEvents='none';
  const pop=document.createElement('div');
  pop.className='dmg-pop pixel'+(extraClass?(' '+extraClass):'');
  pop.textContent=text;
  wrap.appendChild(pop);
  arena.appendChild(wrap);
  setTimeout(()=>wrap.remove(),800);
}
function animateAttack(dmg, crit){
  const frame=document.getElementById('monsterFrame');
  frame.classList.add('shake');
  setTimeout(()=>frame.classList.remove('shake'),300);
  spawnDmgPop((crit?'CRIT! ':'')+'-'+dmg, frame);
  const cv=document.getElementById('sosoCanvas');
  if(cv) drawSoso(cv.getContext('2d'),'attack',0);
  setTimeout(()=>{ if(cv) drawSoso(cv.getContext('2d'),'idle',0); },400);
}
function animateHit(dmg, negated){
  const cv=document.getElementById('sosoCanvas');
  if(cv) drawSoso(cv.getContext('2d'),'hit',0);
  setTimeout(()=>{ if(cv && G.player.hp>0) drawSoso(cv.getContext('2d'),'idle',0); },400);
  spawnDmgPop(negated?'BLOCK!':'-'+dmg, cv, negated?'miss':'');
}
function onMonsterDefeated(){
  const b=G.battle;
  G.progress[G.act].kills = (G.progress[G.act].kills||0)+1;
  const frame=document.getElementById('monsterFrame');
  if(frame) frame.classList.add('dying');
  const cv=document.getElementById('sosoCanvas');
  if(cv) drawSoso(cv.getContext('2d'),'victory',0);
  if(hasItem('heal_on_win')){
    G.player.hp=Math.min(G.player.maxHp, G.player.hp+itemSum('heal_on_win'));
    updatePlayerHud();
  }
  setTimeout(()=>{
    showPanel({
      title:`🎉 ${b.monster.name} 처치!`,
      desc:'승리했습니다.',
      buttons:[{label:'계속', cls:'panel-btn', onClick:()=>{ closePanel(); const cb=b.onWin; G.battle=null; cb(); }}]
    });
  },700);
}
function handleDefeatCheck(){
  if(!G.revived && hasItem('revive')){
    G.revived=true;
    const rIdx = G.items.findIndex(i=>i.type==='revive');
    if(rIdx>=0) G.items.splice(rIdx,1);
    G.player.hp = Math.round(G.player.maxHp*0.5);
    toast('🔄 재입사 제안서 발동! 부활했습니다');
    nextQuestion();
    return;
  }
  clearInterval(G.battle.timer);
  showPanel({
    title:'💀 소소, 쓰러지다',
    desc:'HR 괴물들에게 패배했습니다.<br>다시 도전해볼까요?',
    buttons:[{label:'처음부터', cls:'panel-btn danger', onClick:()=>{ closePanel(); newGame(); renderTitle(); }}]
  });
}

/* =========================================================
   오버레이 패널
   ========================================================= */
function showPanel({title, desc, buttons=[], custom='', onCustomClick}){
  let ov=document.getElementById('overlayPanel');
  if(ov) ov.remove();
  ov=document.createElement('div');
  ov.className='overlay'; ov.id='overlayPanel';
  ov.innerHTML=`<div class="panel">
    <h2>${title}</h2>
    <div class="desc">${desc||''}</div>
    ${custom}
    <div>${buttons.map((b,i)=>`<button class="${b.cls}" data-bi="${i}">${b.label}</button>`).join('')}</div>
  </div>`;
  document.body.appendChild(ov);
  buttons.forEach((b,i)=>{ ov.querySelector(`[data-bi="${i}"]`).onclick=b.onClick; });
  if(onCustomClick){
    ov.querySelectorAll('.reward-card').forEach(card=>{
      card.onclick=()=>onCustomClick(parseInt(card.dataset.idx));
    });
  }
}
function closePanel(){ const ov=document.getElementById('overlayPanel'); if(ov) ov.remove(); }

/* =========================================================
   소소 픽셀 스프라이트 (캔버스 드로잉, 32x36 그리드 → 4px/유닛)
   ========================================================= */
const P = {
  hairDark:'#3A2419', hair:'#4A2E1F', hairHi:'#6B4630',
  skin:'#F7D4B0', skinSh:'#E5B491', blush:'#F0906A',
  cardigan:'#E8A93C', cardiganSh:'#C98A28',
  shirt:'#FFFFFF', shirtSh:'#D8D8D8',
  mug:'#8B5A3C', mugSh:'#5C3823',
  outline:'#2B1B12', white:'#FFFFFF'
};
function drawSoso(ctx, pose, t){
  ctx.clearRect(0,0,132,145);
  ctx.imageSmoothingEnabled=true;
  ctx.save();
  let ox=0, oy=0, mugOffX=0, mugOffY=0, bodyLean=0, flashAlpha=0;
  const bob = Math.sin(Date.now()/450)*1.4;
  oy += bob;
  if(pose==='attack'){ bodyLean=4; mugOffX=3; mugOffY=-2; }
  if(pose==='hit'){ ox=-4; flashAlpha=0.4; }
  if(pose==='victory'){ mugOffY=-9; oy-=3; }
  ctx.translate(ox, oy);

  // 그림자
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(66,140,32,6,0,0,Math.PI*2); ctx.fill();

  // 몸통 / 가디건
  ctx.save(); ctx.translate(bodyLean,0);
  ctx.fillStyle=P.cardigan;
  ctx.beginPath();
  ctx.moveTo(42,142);
  ctx.bezierCurveTo(32,112, 36,82, 47,68);
  ctx.lineTo(56,74);
  ctx.bezierCurveTo(60,80,72,80,76,74);
  ctx.lineTo(85,68);
  ctx.bezierCurveTo(96,82,100,112,90,142);
  ctx.closePath(); ctx.fill();
  // 우측 음영
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(42,142); ctx.bezierCurveTo(32,112, 36,82, 47,68); ctx.lineTo(56,74);
  ctx.bezierCurveTo(60,80,72,80,76,74); ctx.lineTo(85,68);
  ctx.bezierCurveTo(96,82,100,112,90,142); ctx.closePath(); ctx.clip();
  ctx.fillStyle=P.cardiganSh; ctx.globalAlpha=.45;
  ctx.beginPath(); ctx.ellipse(90,110,26,45,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
  // 흰 셔츠 카라
  ctx.fillStyle=P.shirt;
  ctx.beginPath();
  ctx.moveTo(57,70); ctx.lineTo(66,90); ctx.lineTo(75,70); ctx.lineTo(69,65); ctx.lineTo(66,73); ctx.lineTo(63,65);
  ctx.closePath(); ctx.fill();
  // 단추
  ctx.fillStyle=P.cardiganSh;
  ctx.beginPath(); ctx.arc(66,100,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(66,120,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(66,140,1.8,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 머그컵 든 팔
  ctx.fillStyle=P.cardigan;
  ctx.beginPath();
  ctx.moveTo(78+bodyLean,82);
  ctx.bezierCurveTo(93+bodyLean,86, 98+bodyLean,102, 91+bodyLean,118);
  ctx.bezierCurveTo(86+bodyLean,110,79+bodyLean,98,75+bodyLean,88);
  ctx.closePath(); ctx.fill();

  // 머그컵
  ctx.save(); ctx.translate(mugOffX,mugOffY);
  ctx.strokeStyle=P.mug; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(108,106,7,-1.15,1.15); ctx.stroke();
  ctx.fillStyle=P.mug;
  ctx.beginPath();
  ctx.moveTo(84,94); ctx.lineTo(103,94); ctx.bezierCurveTo(103,94,101,118,99,118); ctx.lineTo(87,118);
  ctx.bezierCurveTo(85,118,84,94,84,94); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P.mugSh; ctx.globalAlpha=.6;
  ctx.beginPath(); ctx.ellipse(93.5,94,9.5,2.2,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  ctx.restore();

  // 손
  ctx.fillStyle=P.skin;
  ctx.beginPath(); ctx.ellipse(85+mugOffX,112+mugOffY,7,6,0.4,0,Math.PI*2); ctx.fill();

  // 목
  ctx.fillStyle=P.skin;
  ctx.beginPath(); ctx.ellipse(66,64,9,9,0,0,Math.PI*2); ctx.fill();

  // 얼굴
  ctx.fillStyle=P.skin;
  ctx.beginPath(); ctx.ellipse(66,39,25,26,0,0,Math.PI*2); ctx.fill();
  // 얼굴 우측 음영
  ctx.save();
  ctx.beginPath(); ctx.ellipse(66,39,25,26,0,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=P.skinSh; ctx.globalAlpha=.35;
  ctx.beginPath(); ctx.ellipse(80,44,16,24,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();

  // 귀
  ctx.fillStyle=P.skin;
  ctx.beginPath(); ctx.ellipse(41,41,4.2,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(91,41,4.2,6,0,0,Math.PI*2); ctx.fill();

  // 뒷머리
  ctx.fillStyle=P.hairDark;
  ctx.beginPath();
  ctx.moveTo(39,38);
  ctx.bezierCurveTo(33,10,58,1,66,3);
  ctx.bezierCurveTo(78,-1,100,8,95,38);
  ctx.bezierCurveTo(94,22,84,15,73,18);
  ctx.bezierCurveTo(63,10,48,15,45,27);
  ctx.bezierCurveTo(43,31,41,35,39,38);
  ctx.closePath(); ctx.fill();

  // 윗머리 하이라이트
  ctx.fillStyle=P.hair;
  ctx.beginPath();
  ctx.moveTo(44,25);
  ctx.bezierCurveTo(50,7,82,3,93,23);
  ctx.bezierCurveTo(80,12,54,12,44,25);
  ctx.closePath(); ctx.fill();

  // 앞머리 가닥
  ctx.strokeStyle=P.hairDark; ctx.lineWidth=1.6; ctx.lineCap='round';
  [[47,22,51,31],[57,17,59,29],[71,17,73,28],[81,20,85,29]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo((x1+x2)/2,y1+5,x2,y2); ctx.stroke();
  });

  // 눈썹
  ctx.strokeStyle=P.hairDark; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(52,36); ctx.quadraticCurveTo(58,32,65,35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(69,35); ctx.quadraticCurveTo(76,31,82,35); ctx.stroke();

  // 눈
  ctx.fillStyle = pose==='hit' ? '#fff' : P.outline;
  ctx.beginPath(); ctx.ellipse(58,43,3.2,3.8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(76,43,3.2,3.8,0,0,Math.PI*2); ctx.fill();
  if(pose!=='hit'){
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(59.2,41.3,1.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(77.2,41.3,1.1,0,Math.PI*2); ctx.fill();
  }

  // 볼터치
  ctx.fillStyle=P.blush; ctx.globalAlpha=.55;
  ctx.beginPath(); ctx.ellipse(50,51,5.5,3.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(83,51,5.5,3.2,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // 코
  ctx.strokeStyle=P.skinSh; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(67,43); ctx.quadraticCurveTo(70,49,67,51); ctx.stroke();

  // 입
  ctx.strokeStyle=P.outline; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath();
  if(pose==='victory'){ ctx.moveTo(58,55); ctx.quadraticCurveTo(66,62,74,55); }
  else { ctx.moveTo(60,55); ctx.quadraticCurveTo(66,58.5,72,55); }
  ctx.stroke();

  if(flashAlpha>0){
    ctx.globalAlpha=flashAlpha; ctx.fillStyle='#fff'; ctx.fillRect(-12,-12,156,169); ctx.globalAlpha=1;
  }
  ctx.restore();
}
setInterval(()=>{
  const cv=document.getElementById('sosoCanvas')||document.getElementById('titleCanvas');
  if(cv && (!G || !G.battle || !G.battle.answered)) drawSoso(cv.getContext('2d'), 'idle', 0);
  const mc=document.getElementById('monsterCanvas');
  if(mc && G && G.battle) drawMonster(mc.getContext('2d'), G.battle.monster.id);
},120);

/* =========================================================
   몬스터 픽셀아트 스프라이트 (실제 이미지 대신 코드로 직접 그리는 캐릭터 아트)
   ========================================================= */
const MONSTER_PALETTE = {
  m1:{base:'#7FBF3F', dark:'#4F8A22', eye:'#1B3A0D'},
  m2:{skin:'#6FAF4A', dark:'#3F6B27', cloth:'#7A5230', eye:'#C0392B'},
  m3:{cap:'#D94F4F', spot:'#FFF3E0', stem:'#F0DDBB', eye:'#2B1B12'},
  b1:{skin:'#5B8C2E', dark:'#375719', cloth:'#8A6A1E', crown:'#F0C766', eye:'#C0392B'},
  m4:{wing:'#5B3F80', body:'#3B2A55', eye:'#E85A3C'},
  m5:{fur:'#8A8A95', furDark:'#54545E', eye:'#F0C766'},
  m6:{stone:'#9C9188', stoneDark:'#6B635C', glow:'#7FD1FF'},
  b2:{skin:'#5E7A3A', dark:'#3A4E22', cloth:'#5C4326', crown:'#F0C766', eye:'#F0C766'},
  m7:{robe:'#3B2A55', robeDark:'#241A38', bone:'#EDE3C8', eye:'#8FBF5C'},
  m8:{scale:'#4E8A4E', scaleDark:'#2E5B2E', eye:'#F0C766'},
  m9:{body:'rgba(224,238,255,0.9)', eye:'#2B1B12'},
  b3:{body:'#B23A24', dark:'#7A2416', belly:'#F0C766', eye:'#F0C766'}
};
function drawMonster(ctx, id){
  ctx.clearRect(0,0,120,120);
  ctx.imageSmoothingEnabled=true;
  const bob=Math.sin(Date.now()/480)*2.5;
  const P=MONSTER_PALETTE[id];
  if(!P) return;
  ctx.save();
  ctx.translate(0,bob);
  // 그림자
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath(); ctx.ellipse(60,112,30,6,0,0,Math.PI*2); ctx.fill();
  const fn = {m1:drawSlime,m2:drawGoblin,m3:drawMushroom,b1:drawOrcBoss,m4:drawBat,m5:drawWolf,
    m6:drawGolem,b2:drawTrollBoss,m7:drawLich,m8:drawHydra,m9:drawGhost,b3:drawDragonBoss}[id];
  if(fn) fn(ctx,P);
  ctx.restore();
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function softHi(ctx,x,y,rx,ry,alpha){
  ctx.save(); ctx.globalAlpha=alpha||.28; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function drawSlime(ctx,P){
  ctx.fillStyle=P.dark; ctx.beginPath(); ctx.ellipse(60,84,38,29,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=P.base; ctx.beginPath(); ctx.ellipse(60,78,36,26,0,0,Math.PI*2); ctx.fill();
  softHi(ctx,45,64,11,7,.4);
  ctx.fillStyle=P.eye;
  ctx.beginPath(); ctx.ellipse(48,76,3.6,4.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(68,76,3.6,4.2,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=P.eye; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(58,84,8,0.15,Math.PI-0.15); ctx.stroke();
}
function drawGoblin(ctx,P){

  ctx.fillStyle=P.cloth; rr(ctx,36,58,48,40,12); ctx.fill();
  softHi(ctx,48,66,10,6,.18);
  ctx.fillStyle=P.skin; ctx.beginPath(); ctx.ellipse(60,45,22,20,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(38,42); ctx.quadraticCurveTo(22,32,20,30); ctx.quadraticCurveTo(28,42,36,50); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(82,42); ctx.quadraticCurveTo(98,32,100,30); ctx.quadraticCurveTo(92,42,84,50); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P.eye;
  ctx.beginPath(); ctx.ellipse(52,44,3.4,3.8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(68,44,3.4,3.8,0,0,Math.PI*2); ctx.fill();

function drawMushroom(ctx,P){

  ctx.moveTo(38,20); ctx.quadraticCurveTo(41,10,44,6); ctx.quadraticCurveTo(48,14,52,18);
  ctx.quadraticCurveTo(56,8,60,4); ctx.quadraticCurveTo(64,8,68,18);

function drawBat(ctx,P){
  ctx.fillStyle=P.wing;
  ctx.beginPath(); ctx.moveTo(60,55); ctx.quadraticCurveTo(20,30,10,60); ctx.quadraticCurveTo(35,55,50,68); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(60,55); ctx.quadraticCurveTo(100,30,110,60); ctx.quadraticCurveTo(85,55,70,68); ctx.closePath(); ctx.fill();

function drawSosoToken(ctx){
  ctx.clearRect(0,0,34,34);
  ctx.imageSmoothingEnabled=true;
  ctx.save();
  ctx.beginPath(); ctx.arc(17,17,17,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#F5B95C';
  ctx.fillRect(0,0,34,34);
  // 어깨/가디건
  ctx.fillStyle=P.cardigan;
  ctx.beginPath(); ctx.ellipse(17,33,15,9,0,0,Math.PI*2); ctx.fill();
  // 얼굴
  ctx.fillStyle=P.skin;
  ctx.beginPath(); ctx.ellipse(17,17,9.5,10,0,0,Math.PI*2); ctx.fill();
  // 귀
  ctx.beginPath(); ctx.ellipse(7.5,18,1.8,2.6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(26.5,18,1.8,2.6,0,0,Math.PI*2); ctx.fill();
  // 뒷머리
  ctx.fillStyle=P.hairDark;
  ctx.beginPath();
  ctx.moveTo(7,17); ctx.bezierCurveTo(5,4,29,4,27,17);
  ctx.bezierCurveTo(26,10,20,7,17,8); ctx.bezierCurveTo(13,6,8,10,7,17);
  ctx.closePath(); ctx.fill();
  // 앞머리 하이라이트
  ctx.fillStyle=P.hair;
  ctx.beginPath(); ctx.moveTo(8,11); ctx.bezierCurveTo(12,3,24,3,26,11);
  ctx.bezierCurveTo(20,6,12,6,8,11); ctx.closePath(); ctx.fill();
  // 눈썹
  ctx.strokeStyle=P.hairDark; ctx.lineWidth=1.1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(12,15); ctx.quadraticCurveTo(14,13.5,16.5,15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(17.5,15); ctx.quadraticCurveTo(20,13.5,22,15); ctx.stroke();
  // 눈
  ctx.fillStyle=P.outline;
  ctx.beginPath(); ctx.arc(14.3,18,1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(19.7,18,1.3,0,Math.PI*2); ctx.fill();
  // 볼터치
  ctx.fillStyle=P.blush; ctx.globalAlpha=.6;
  ctx.beginPath(); ctx.ellipse(11.5,21,2.1,1.3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(22.5,21,2.1,1.3,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // 입
  ctx.strokeStyle=P.outline; ctx.lineWidth=1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(14.5,23); ctx.quadraticCurveTo(17,25,19.5,23); ctx.stroke();
  ctx.restore();
  ctx.strokeStyle=P.outline; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(17,17,15.5,0,Math.PI*2); ctx.stroke();
}
